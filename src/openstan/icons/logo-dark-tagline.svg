<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 84" width="300" height="84" role="img" aria-label="openstan logo (dark mode)">
  <title>openstan — secure statement analysis</title>

  <!-- ===== Icon mark: open book ===== -->
  <g transform="translate(4, 12)">

