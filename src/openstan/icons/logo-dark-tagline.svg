    <rect x="6"  y="10" width="19" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="15" width="15" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="20" width="17" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="25" width="13" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="30" width="18" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="35" width="11" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="40" width="16" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
    <rect x="6"  y="45" width="14" height="2.5" rx="1.2" fill="white" opacity="0.75"/>

    <!-- ── Spine ── -->
    <line x1="30" y1="2"  x2="30" y2="58" stroke="#0F2D5E" stroke-width="1.5"/>
    <line x1="31.5" y1="3" x2="31.5" y2="57" stroke="white" stroke-width="0.7" opacity="0.3"/>

    <!-- ── Right page (chart side) ── -->
    <path d="M32,4 Q32,2 34,2 L58,2 Q60,2 60,4 L60,56 Q60,58 58,58 L34,58 Q32,58 32,56 Z" fill="#1E4D8C"/>
    <rect x="35" y="8" width="22" height="42" rx="2" fill="#4A7FC1" opacity="0.35"/>
    <rect x="37" y="38" width="5" height="10" rx="1.5" fill="#F97316"/>
    <rect x="44" y="28" width="5" height="20" rx="1.5" fill="#F97316"/>
    <rect x="51" y="18" width="5" height="30" rx="1.5" fill="#FB923C"/>
    <line x1="35" y1="50" x2="57" y2="50" stroke="white" stroke-width="1" opacity="0.5"/>

    <!-- ── Book shadow (softened for dark bg) ── -->
    <ellipse cx="31" cy="59" rx="27" ry="3" fill="#0F2D5E" opacity="0.30"/>

  </g>

  <!-- ===== Wordmark — dark mode ===== -->
  <text
    x="76"
    y="42"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="28"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#F0F0F0"
  >open<tspan fill="#F97316">stan</tspan></text>

  <!-- ===== Tagline — dark mode ===== -->
  <text
    x="77"
    y="59"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="11"
    font-weight="400"
