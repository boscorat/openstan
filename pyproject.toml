[project]
name = "openstan"
version = "0.1.0"
description = "Open source application for statement analysis and visualization"
readme = "README.md"
authors = [
    { name = "Jason Farrar", email = "stillwaters.technology@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "pyqt6>=6.10.2",
    "tomli-w>=1.2.0",
    "uk-bank-statement-parser",
]

[project.urls]
Homepage = "https://openstan.org"
Repository = "https://github.com/boscorat/openstan"

[project.scripts]
openstan = "openstan:main"

[build-system]
requires = ["uv_build>=0.9.17,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pyrefly>=0.50.0",
    "pytest>=9.0.0",
    "ruff>=0.14.14",
]

[tool.uv.sources]
uk-bank-statement-parser = { git = "https://github.com/boscorat/bank_statement_parser", tag = "v0.2.1a6" }

[tool.pyrefly]
search-path = ["."]
