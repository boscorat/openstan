[project]
name = "openstan"
version = "0.1.0"
description = "Open source application for statement analysis and visualization"
readme = "README.md"
authors = [
    { name = "Jason Farrar", email = "stillwaters.technology@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "pyqt6>=6.10.2",
    "bank_statement_parser",
]

[tool.uv.sources]
bank_statement_parser = { git = "https://github.com/boscorat/bank_statement_parser.git"}

[project.scripts]
openstan = "openstan:main"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pyrefly>=0.50.0",
    "ruff>=0.14.14",
]
