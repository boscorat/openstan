[project]
name = "openstan"
version = "0.1.0"
description = "Open source application for statement analysis and visualization"
readme = "README.md"
authors = [
    { name = "Jason Farrar", email = "stillwaters.technology@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "pyqt6>=6.10.2",
]

[project.scripts]
openstan_cli = "openstan:cli"

[project.gui-scripts]
openstan_gui = "openstan:gui"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pyrefly>=0.50.0",
]