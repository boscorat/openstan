name: Clean Up Old Release Assets

# Runs automatically whenever a new release is published.
# Keeps assets on the 5 most recent releases; for every older release it
# deletes all binary assets and uploads a small NOTICE.txt in their place
# so visitors know where to find the current installer.

on:
  release:
    types: [published]

permissions: {}  # no workflow-level permissions; job declares its own

jobs:
  cleanup:
    name: Strip assets from releases beyond the 5 most recent
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to delete assets and upload NOTICE.txt

    env:
      KEEP: 5          # number of most-recent releases whose assets are preserved
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Delete old assets and upload NOTICE.txt
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          echo "Fetching release list for ${REPO}..."

          # Fetch up to 100 releases, newest first, as newline-separated tag names.
          # --exclude-drafts and --exclude-pre-releases are intentionally omitted:
          # pre-releases count toward the KEEP total so a run of pre-releases does
          # not inadvertently cause stable release assets to be stripped early.
          TAGS=$(gh release list \
                   --repo "$REPO" \
                   --limit 100 \
                   --json tagName,createdAt \
                   --order desc \
                   --jq '.[].tagName')

          TAG_COUNT=$(echo "$TAGS" | wc -l)
          echo "Found ${TAG_COUNT} release(s). Keeping assets on the ${KEEP} most recent."

          INDEX=0
          while IFS= read -r TAG; do
            INDEX=$((INDEX + 1))

            if [ "$INDEX" -le "$KEEP" ]; then
              echo "[${INDEX}] KEEP   ${TAG}"
              continue
            fi

            echo "[${INDEX}] STRIP  ${TAG}"

            # ── Delete every existing asset on this release ──────────────────
            ASSET_IDS=$(gh release view "$TAG" \
                          --repo "$REPO" \
                          --json assets \
                          --jq '.assets[].id' 2>/dev/null || true)

            if [ -n "$ASSET_IDS" ]; then
              while IFS= read -r ASSET_ID; do
                # Skip any already-uploaded NOTICE.txt (idempotent re-runs)
                ASSET_NAME=$(gh release view "$TAG" \
                               --repo "$REPO" \
                               --json assets \
                               --jq ".assets[] | select(.id == ${ASSET_ID}) | .name" \
                               2>/dev/null || true)
                if [ "$ASSET_NAME" = "NOTICE.txt" ]; then
                  echo "  Skipping existing NOTICE.txt on ${TAG}"
                  continue
                fi
                echo "  Deleting asset ${ASSET_ID} (${ASSET_NAME}) from ${TAG}..."
                gh release delete-asset "$TAG" "$ASSET_ID" \
                  --repo "$REPO" \
                  --yes
              done <<< "$ASSET_IDS"
            else
              echo "  No assets found on ${TAG} (already stripped or never uploaded)."
            fi

            # ── Check whether NOTICE.txt is already present ──────────────────
            NOTICE_EXISTS=$(gh release view "$TAG" \
                              --repo "$REPO" \
                              --json assets \
                              --jq '.assets[] | select(.name == "NOTICE.txt") | .name' \
                              2>/dev/null || true)
            if [ -n "$NOTICE_EXISTS" ]; then
              echo "  NOTICE.txt already present on ${TAG}, skipping upload."
              continue
            fi

            # ── Write and upload NOTICE.txt ──────────────────────────────────
            NOTICE_FILE=$(mktemp /tmp/NOTICE_XXXXXX.txt)
            cat > "$NOTICE_FILE" <<EOF
          Installation assets for this release have been removed as part of routine maintenance.

          Please visit https://github.com/${REPO}/releases/latest to download the latest version.
          EOF

            gh release upload "$TAG" "$NOTICE_FILE#NOTICE.txt" \
              --repo "$REPO" \
              --clobber
            echo "  Uploaded NOTICE.txt to ${TAG}."
            rm -f "$NOTICE_FILE"

          done <<< "$TAGS"

          echo "Done."
