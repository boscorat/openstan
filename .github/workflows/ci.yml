name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgles2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Fetch anonymised PDFs for testing (graceful fallback)
        id: fetch_anonymised
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY_TEST_DATA: ${{ secrets.SSH_PRIVATE_KEY_TEST_DATA }}
        run: |
          # Check if SSH key secret is available
          if [ -z "$SSH_PRIVATE_KEY_TEST_DATA" ]; then
            echo "SSH_PRIVATE_KEY_TEST_DATA secret is not set - skipping PDF fetch"
            exit 0
          fi
          
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY_TEST_DATA" > ~/.ssh/bank_statement_deploy_key
          chmod 600 ~/.ssh/bank_statement_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Configure SSH to use the deploy key for github.com
          cat > ~/.ssh/config << 'SSH_CONFIG'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/bank_statement_deploy_key
            IdentitiesOnly yes
          SSH_CONFIG
          chmod 600 ~/.ssh/config
          
          # Clone only the pdfs directory
          git clone --depth 1 --filter=blob:none --sparse \
            git@github.com:boscorat/bank-statement-data.git /tmp/test_pdfs
          
          cd /tmp/test_pdfs
          git sparse-checkout set pdfs/good pdfs/bad
          
          # Populate bsp's cache so TestHarness finds PDFs without cloning
          mkdir -p ~/.cache/bank_statement_data/pdfs
          cp -r /tmp/test_pdfs/pdfs/good ~/.cache/bank_statement_data/pdfs/
          cp -r /tmp/test_pdfs/pdfs/bad ~/.cache/bank_statement_data/pdfs/
          
          # Create empty .git dir so _clone_test_data() takes the "pull" path
          # instead of the "clone" path, and falls back to returning the cache
          mkdir -p ~/.cache/bank_statement_data/repo/.git
          
          # Create symlinks for conftest's "anonymised" mode detection
          mkdir -p "${GITHUB_WORKSPACE}/tests/fixtures/pdfs"
          ln -s /tmp/test_pdfs/pdfs/good "${GITHUB_WORKSPACE}/tests/fixtures/pdfs/anonymised_good"
          ln -s /tmp/test_pdfs/pdfs/bad "${GITHUB_WORKSPACE}/tests/fixtures/pdfs/anonymised_bad"
          
          # Keep /tmp/test_pdfs around for the symlinks to reference during tests
          # (it will be cleaned up in the post-cleanup job)
          # Only remove SSH key immediately after clone
          rm -f ~/.ssh/bank_statement_deploy_key
          
          # Mark success
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyrefly)
        run: uv run pyrefly check

      - name: Test (pytest)
        run: uv run pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen

  cleanup:
    name: Post-run cleanup (PDFs and temporary files)
    if: always()  # Always runs regardless of test job outcome
    needs: test   # Runs after test job completes
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Remove anonymised PDF symlinks and temporary directories
        run: |
          # Remove symlinks to cloned PDFs
          rm -f "${GITHUB_WORKSPACE}/tests/fixtures/pdfs/anonymised_good" \
                "${GITHUB_WORKSPACE}/tests/fixtures/pdfs/anonymised_bad"
          
          # Clean up temporary PDF clone directory
          rm -rf /tmp/test_pdfs || true
          
          # Clean up bsp's cache directory
          rm -rf ~/.cache/bank_statement_data || true
          
          # Clean up any stray PDF files that may have been copied
          find "${GITHUB_WORKSPACE}/tests/fixtures/pdfs" -name "*.pdf" \
            -not -path "*/synthetic/*" -delete 2>/dev/null || true
          
          # Clean up SSH artifacts from home directory
          rm -f ~/.ssh/bank_statement_deploy_key \
                ~/.ssh/config \
                ~/.ssh/known_hosts 2>/dev/null || true

  doc-reminder:
    # Only runs on pull requests; non-blocking reminder only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for view file changes
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- 'src/openstan/views/*.py' || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post documentation reminder
        if: steps.check.outputs.changed != ''
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88  # v2
        with:
          header: doc-reminder
          message: |
            **Documentation reminder**

            The following view file(s) were modified in this PR:
            ```
            ${{ steps.check.outputs.changed }}
            ```

            Please review and update the relevant pages in `docs/screens/` before merging.

            If the UI has visually changed, capture a new screenshot for the affected screen(s) and commit it to `docs/assets/screenshots/`. See [`docs/assets/screenshots/SCREENSHOTS.md`](../blob/master/docs/assets/screenshots/SCREENSHOTS.md) for the filename, required app state, and capture instructions for each screen.
