name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgles2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Fetch anonymised PDFs for testing (graceful fallback)
        id: fetch_anonymised
        continue-on-error: true
        if: env.SSH_PRIVATE_KEY_TEST_DATA != ''
        env:
          SSH_PRIVATE_KEY_TEST_DATA: ${{ secrets.SSH_PRIVATE_KEY_TEST_DATA }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_PRIVATE_KEY_TEST_DATA }}" > ~/.ssh/bank_statement_deploy_key
          chmod 600 ~/.ssh/bank_statement_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Configure SSH to use the deploy key for github.com
          cat > ~/.ssh/config << 'SSH_CONFIG'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/bank_statement_deploy_key
            IdentitiesOnly yes
          SSH_CONFIG
          chmod 600 ~/.ssh/config
          
          # Clone only the pdfs directory
          git clone --depth 1 --filter=blob:none --sparse \
            git@github.com:boscorat/bank-statement-data.git /tmp/test_pdfs
          
          cd /tmp/test_pdfs
          git sparse-checkout set pdfs/good pdfs/bad
          
          # Copy to tests/fixtures/pdfs (relative to workflow root)
          mkdir -p "${GITHUB_WORKSPACE}/tests/fixtures/pdfs"
          cp -r pdfs/good "${GITHUB_WORKSPACE}/tests/fixtures/pdfs/" || true
          cp -r pdfs/bad "${GITHUB_WORKSPACE}/tests/fixtures/pdfs/" || true
          
          # Cleanup temporary clone
          cd ..
          rm -rf test_pdfs
          rm -f ~/.ssh/bank_statement_deploy_key
          
          # Mark success
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyrefly)
        run: uv run pyrefly check

      - name: Test (pytest)
        run: uv run pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Clean up anonymised PDFs after tests (security)
        if: steps.fetch_anonymised.outputs.success == 'true' && always()
        run: |
          # Remove anonymised PDFs to prevent accidental commits
          rm -rf tests/fixtures/pdfs/good tests/fixtures/pdfs/bad tests/fixtures/pdfs/anonymised || true
          find tests/fixtures/pdfs -name "*.pdf" -not -path "*/synthetic/*" -delete || true

  doc-reminder:
    # Only runs on pull requests; non-blocking reminder only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for view file changes
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- 'src/openstan/views/*.py' || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post documentation reminder
        if: steps.check.outputs.changed != ''
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88  # v2
        with:
          header: doc-reminder
          message: |
            **Documentation reminder**

            The following view file(s) were modified in this PR:
            ```
            ${{ steps.check.outputs.changed }}
            ```

            Please review and update the relevant pages in `docs/screens/` before merging.

            If the UI has visually changed, capture a new screenshot for the affected screen(s) and commit it to `docs/assets/screenshots/`. See [`docs/assets/screenshots/SCREENSHOTS.md`](../blob/master/docs/assets/screenshots/SCREENSHOTS.md) for the filename, required app state, and capture instructions for each screen.
