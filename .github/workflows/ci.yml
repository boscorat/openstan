name: CI

on:
  push:
    branches: [master]
    tags-ignore: ["**"]  # release tags trigger release.yml only, not CI
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgles2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyrefly)
        run: uv run pyrefly check

      - name: Test (pytest)
        run: uv run pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen

  doc-reminder:
    # Only runs on pull requests; non-blocking reminder only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for view file changes
        id: check
        run: |
          changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'src/openstan/views/*.py' || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post documentation reminder
        if: steps.check.outputs.changed != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: doc-reminder
          message: |
            **Documentation reminder**

            The following view file(s) were modified in this PR:
            ```
            ${{ steps.check.outputs.changed }}
            ```

            Please review and update the relevant pages in `docs/screens/` before merging, and re-run `uv run pytest tests/test_screenshots.py` to regenerate any affected screenshots.
