name: CI

on:
  push:
    branches: [master]
    tags-ignore: ["**"]  # release tags trigger release.yml only, not CI
  pull_request:
    branches: [master]

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          cache: false
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgles2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyrefly)
        run: uv run pyrefly check

      - name: Test (pytest)
        run: uv run pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen

  doc-reminder:
    # Only runs on pull requests; non-blocking reminder only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for view file changes
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- 'src/openstan/views/*.py' || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post documentation reminder
        if: steps.check.outputs.changed != ''
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2
        with:
          header: doc-reminder
          message: |
            **Documentation reminder**

            The following view file(s) were modified in this PR:
            ```
            ${{ steps.check.outputs.changed }}
            ```

            Please review and update the relevant pages in `docs/screens/` before merging.

            If the UI has visually changed, capture a new screenshot for the affected screen(s) and commit it to `docs/assets/screenshots/`. See [`docs/assets/screenshots/SCREENSHOTS.md`](../blob/master/docs/assets/screenshots/SCREENSHOTS.md) for the filename, required app state, and capture instructions for each screen.
