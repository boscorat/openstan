name: Release

# Triggered when a version tag is pushed (e.g. v1.0.0).
# Builds platform-native installers on each OS and attaches them to the
# GitHub Release that is created (or must already exist) for the tag.
#
# Packager strategy: cx_Freeze primary, PyInstaller fallback.
# This workflow uses cx_Freeze for all platforms.  If cx_Freeze fails on a
# platform during validation testing, switch that job's build step to the
# PyInstaller path (see comments in each job).
#
# Icon conversion strategy: Inkscape (Linux/macOS) + resvg (Windows).
# cairosvg requires the libcairo system library which is not pre-installed on
# any GitHub-hosted runner.  Inkscape works headlessly on Linux/macOS runners.
# On Windows, Inkscape requires DBus/display and crashes silently; resvg is a
# single headless Rust binary (choco install resvg) with no system dependencies.
# Pillow is then used (Python-only, no system deps) to produce .ico and .icns.

on:
  push:
    tags:
      - "v*"

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  # ---------------------------------------------------------------------------
  # Linux — produces .deb and .rpm using fpm
  # ---------------------------------------------------------------------------
  #
  # Pipeline:
  #   1. cx_Freeze builds the frozen application directory (dist/openstan/)
  #   2. fpm packages dist/openstan/ directly into .deb and .rpm
  #
  # Why fpm instead of cx_Freeze bdist_rpm / bdist_deb + alien:
  #   • cx_Freeze's bdist_rpm runs rpmbuild's find-requires scanner, which
  #     emits Requires: entries for every bundled .so by its hashed filename
  #     (e.g. libcrypto-6012f135.so.3).  Those names do not exist as system
  #     packages, so dnf/apt refuse to install the package.  The no_autoreq
  #     flag is not reliably honoured via the setup() options dict.
  #   • alien (RPM→DEB conversion) silently drops RPM scriptlets, requiring
  #     a manual dpkg-deb repack to inject postinst/postrm.
  #   • fpm packages the frozen directory directly, never runs find-requires,
  #     and supports --after-install / --after-remove natively on both targets.
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux packages (.deb / .rpm)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libfontconfig1 libfreetype6 \
            rpm \
            inkscape

      - name: Install fpm
        run: |
          sudo gem install --no-document fpm
          fpm --version

      - name: Install Python dependencies
        # Runtime deps only — build tools (cx_Freeze, Pillow) are injected
        # ephemerally via --with so they are never present in the app venv
        # and therefore never bundled into the frozen installer.
        run: uv sync --no-dev

      # Inkscape converts SVG → PNG; the resulting .png is placed in the
      # package share/ directory so the .desktop entry can reference it.
      - name: Convert app icon SVG → PNG
        run: |
          mkdir -p build/icons
          inkscape --export-type=png \
                   --export-filename=build/icons/openstan.png \
                   --export-width=256 --export-height=256 \
                   src/openstan/icons/icon-square.svg

      # ── cx_Freeze build ────────────────────────────────────────────────────
      - name: Build frozen app (cx_Freeze)
        run: uv run --with cx-freeze==8.6.4 python cx_freeze_setup.py build

      - name: Verify icon and .desktop file were bundled
        run: |
          echo "--- dist/openstan/share/ contents ---"
          ls -lh dist/openstan/share/ || echo "(share/ directory not found)"
          echo "--- PNG existence check ---"
          test -f dist/openstan/share/openstan.png && echo "PNG: OK" || echo "PNG: MISSING"
          test -f dist/openstan/share/openstan.desktop && echo ".desktop: OK" || echo ".desktop: MISSING"

      # ── fpm packaging ──────────────────────────────────────────────────────
      # fpm packages the frozen dist/openstan/ directory directly into .deb
      # and .rpm without running any auto-dependency scanner.  Only libxcb-
      # cursor0 is declared as an explicit runtime dependency — everything else
      # (Qt, Python, OpenSSL, etc.) is already bundled inside the frozen app.
      #
      # Install path: /usr/lib/openstan-<version>/
      # The post-install script registers the .desktop entry and icon; the
      # post-uninstall script removes them.
      - name: Package .deb and .rpm (fpm)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          INSTALL_DIR="/usr/lib/openstan-${VERSION}"
          mkdir -p dist

          FPM_COMMON=(
            --name openstan
            --version "$VERSION"
            --maintainer "Jason Farrar <stillwaters.technology@gmail.com>"
            --url "https://openstan.org"
            --description "Open source bank statement analysis and visualization"
            --license "LGPL-3.0-or-later"
            --after-install  packaging/post-install.sh
            --after-remove   packaging/post-uninstall.sh
            --chdir dist
            "openstan/=${INSTALL_DIR}/"
          )

          # .deb — Debian/Ubuntu
          fpm -s dir -t deb \
            --depends libxcb-cursor0 \
            --deb-no-default-config-files \
            --package "dist/openstan-${VERSION}-Linux-Ubuntu-x86_64.deb" \
            "${FPM_COMMON[@]}"

          # .rpm — Fedora/RHEL/openSUSE
          # xcb-util-cursor is the Fedora package name for the xcb cursor library
          fpm -s dir -t rpm \
            --depends xcb-util-cursor \
            --rpm-os linux \
            --package "dist/openstan-${VERSION}-Linux-Fedora-x86_64.rpm" \
            "${FPM_COMMON[@]}"

          echo "--- Built packages ---"
          ls -lh dist/*.deb dist/*.rpm

      # ── PyInstaller fallback (uncomment if cx_Freeze fails) ───────────────
      # - name: Build frozen app (PyInstaller fallback)
      #   run: uv run pyinstaller openstan.spec
      # - name: Package .deb and .rpm (fpm fallback)
      #   run: |
      #     VERSION="${GITHUB_REF_NAME#v}"
      #     fpm -s dir -t deb -n openstan -v "$VERSION" \
      #         --depends libxcb-cursor0 \
      #         --after-install packaging/post-install.sh \
      #         --after-remove  packaging/post-uninstall.sh \
      #         dist/openstan/=/usr/lib/openstan-${VERSION}/
      #     fpm -s dir -t rpm -n openstan -v "$VERSION" \
      #         --depends xcb-util-cursor \
      #         --after-install packaging/post-install.sh \
      #         --after-remove  packaging/post-uninstall.sh \
      #         dist/openstan/=/usr/lib/openstan-${VERSION}/

      - name: Upload .deb and .rpm to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          draft: true
          files: |
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Linux ARM64 — produces _arm64.deb and .aarch64.rpm
  # ---------------------------------------------------------------------------
  #
  # Identical pipeline to build-linux above, running on the GitHub-hosted
  # ubuntu-24.04-arm runner (free for public repos).  The only differences are:
  #   • runner: ubuntu-24.04-arm  (native aarch64 — no cross-compilation)
  #   • .deb filename suffix: _arm64.deb
  #   • .rpm filename suffix: .aarch64.rpm
  # ---------------------------------------------------------------------------
  build-linux-arm64:
    name: Build Linux ARM64 packages (.deb / .rpm)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libfontconfig1 libfreetype6 \
            rpm \
            inkscape

      - name: Install fpm
        run: |
          sudo gem install --no-document fpm
          fpm --version

      - name: Install Python dependencies
        run: uv sync --no-dev

      - name: Convert app icon SVG → PNG
        run: |
          mkdir -p build/icons
          inkscape --export-type=png \
                   --export-filename=build/icons/openstan.png \
                   --export-width=256 --export-height=256 \
                   src/openstan/icons/icon-square.svg

      - name: Build frozen app (cx_Freeze)
        run: uv run --with cx-freeze==8.6.4 python cx_freeze_setup.py build

      - name: Verify icon and .desktop file were bundled
        run: |
          echo "--- dist/openstan/share/ contents ---"
          ls -lh dist/openstan/share/ || echo "(share/ directory not found)"
          test -f dist/openstan/share/openstan.png && echo "PNG: OK" || echo "PNG: MISSING"
          test -f dist/openstan/share/openstan.desktop && echo ".desktop: OK" || echo ".desktop: MISSING"

      - name: Package _arm64.deb and .aarch64.rpm (fpm)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          INSTALL_DIR="/usr/lib/openstan-${VERSION}"
          mkdir -p dist

          FPM_COMMON=(
            --name openstan
            --version "$VERSION"
            --maintainer "Jason Farrar <stillwaters.technology@gmail.com>"
            --url "https://openstan.org"
            --description "Open source bank statement analysis and visualization"
            --license "LGPL-3.0-or-later"
            --after-install  packaging/post-install.sh
            --after-remove   packaging/post-uninstall.sh
            --chdir dist
            "openstan/=${INSTALL_DIR}/"
          )

          # .deb — Debian/Ubuntu arm64
          fpm -s dir -t deb \
            --depends libxcb-cursor0 \
            --deb-no-default-config-files \
            --package "dist/openstan-${VERSION}-Linux-Ubuntu-arm64.deb" \
            "${FPM_COMMON[@]}"

          # .rpm — Fedora/RHEL/openSUSE aarch64
          fpm -s dir -t rpm \
            --depends xcb-util-cursor \
            --rpm-os linux \
            --package "dist/openstan-${VERSION}-Linux-Fedora-arm64.rpm" \
            "${FPM_COMMON[@]}"

          echo "--- Built packages ---"
          ls -lh dist/*.deb dist/*.rpm

      - name: Upload ARM64 .deb and .rpm to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          draft: true
          files: |
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Windows — produces .msi installer (WiX v4)
  # ---------------------------------------------------------------------------
  #
  # Pipeline:
  #   1. cx_Freeze builds the frozen application directory (dist/openstan/)
  #   2. make_installer_bitmaps.py generates branding BMPs from the app SVG
  #   3. make_wix_fragments.py harvests dist/openstan/ into files.wxs
  #   4. WiX compiles openstan.wxs + files.wxs into the final .msi
  #
  # The resulting MSI provides:
  #   • Welcome page with branding
  #   • License agreement page
  #   • Install-folder selection
  #   • Progress and Finish pages with "Launch openstan" checkbox
  #   • Desktop and Start Menu shortcuts
  #   • Clean major-upgrade (previous version replaced automatically)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows installer (.msi)
    runs-on: windows-latest
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install resvg (headless SVG→PNG, no display required)
        shell: pwsh
        run: |
          $url = "https://github.com/linebender/resvg/releases/download/v0.44.0/resvg-win64.zip"
          Invoke-WebRequest $url -OutFile resvg.zip
          Expand-Archive resvg.zip -DestinationPath C:\resvg
          echo "C:\resvg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add --global WixToolset.UI.wixext/4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" | `
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python dependencies
        # Runtime deps only — build tools injected ephemerally via --with.
        run: uv sync --no-dev

      - name: Install polars runtime-compat backend (Windows CPU compatibility)
        # polars-runtime-32 (the default polars backend) requires SSE4.1+ and
        # will crash with ILLEGAL_INSTRUCTION (0xc000001d) on VMs or older
        # hardware that does not expose those instructions.
        # polars[rtcompat] installs polars-runtime-compat alongside it: a
        # maximally-compatible fallback compiled for the SSE2 baseline.  When
        # present, polars selects it automatically on CPUs that cannot run rt32.
        # This is Windows-only: Linux and macOS builds have not shown CPU
        # crashes and the extra ~49 MB is not warranted there.
        run: uv pip install "polars[rtcompat]"

      # resvg is a headless Rust SVG renderer — works on Windows runners with
      # no display, unlike Inkscape which requires DBus/X11.
      # Pillow (pure Python) assembles the per-size PNGs into a .ico.
      - name: Convert app icon SVG → .ico
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\icons | Out-Null
          $sizes = 16, 32, 48, 64, 128, 256
          foreach ($sz in $sizes) {
            resvg --width $sz --height $sz `
                  src\openstan\icons\icon-square.svg `
                  "build\icons\icon_${sz}.png"
          }
          uv run --with pillow python .github/scripts/make_ico.py

      # Generate the WiX installer branding bitmaps (banner + dialog background)
      # from the app SVG using resvg (already on PATH) and Pillow.
      - name: Generate installer branding bitmaps
        run: |
          uv run --with pillow python packaging/windows/make_installer_bitmaps.py `
            --svg src/openstan/icons/icon-square.svg `
            --resvg resvg `
            --out-dir packaging/windows
        shell: pwsh

      # ── cx_Freeze frozen app build ─────────────────────────────────────────
      - name: Build frozen app (cx_Freeze)
        run: uv run --with cx-freeze==8.6.4 python cx_freeze_setup.py build

      # Harvest the frozen app directory into a WiX component fragment.
      # make_wix_fragments.py walks dist/openstan/ and emits
      # packaging/windows/files.wxs with deterministic component GUIDs
      # (UUID v5, stable across builds of the same version).
      - name: Harvest frozen app into WiX component fragment
        run: python packaging/windows/make_wix_fragments.py

      # ── WiX build ──────────────────────────────────────────────────────────
      # Compile openstan.wxs + files.wxs into the final MSI.
      # The version is taken from the openstan.exe file version embedded by
      # cx_Freeze (!(bind.FileVersion.openstan.exe) in openstan.wxs).
      - name: Build .msi installer (WiX v4)
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME -replace '^v', ''
          $msi_out = "dist\openstan-${version}-Windows.msi"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build `
            packaging/windows/openstan.wxs `
            packaging/windows/files.wxs `
            -ext WixToolset.UI.wixext `
            -d AppDir=dist\openstan `
            -o $msi_out
          Write-Host "Built: $msi_out"
          Get-ChildItem dist\*.msi | Format-Table Name, Length

      # ── PyInstaller fallback (uncomment if cx_Freeze fails) ───────────────
      # - name: Build frozen app (PyInstaller fallback)
      #   run: uv run pyinstaller openstan.spec
      # - name: Harvest PyInstaller output into WiX fragment
      #   run: python packaging/windows/make_wix_fragments.py --app-dir dist/openstan
      # - name: Build .msi installer (WiX v4, PyInstaller fallback)
      #   shell: pwsh
      #   run: |
      #     $version = "${{ github.ref_name }}" -replace '^v', ''
      #     wix build packaging/windows/openstan.wxs packaging/windows/files.wxs `
      #       -d AppDir=dist\openstan -d WixSourceDir=. `
      #       -o "dist\openstan-${version}.msi"

      - name: Upload .msi to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          draft: true
          files: dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # macOS — produces .dmg disk image
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS disk image (.dmg)
    runs-on: macos-latest
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Remove untrusted Homebrew taps (pre-installed on runner)
        run: |
          brew uninstall --ignore-dependencies bicep || true
          brew untap azure/bicep || true
          brew untap aws/tap || true

      - name: Install Inkscape
        run: brew install inkscape

      - name: Install libiodbc (required by cx_Freeze on macOS)
        run: brew install libiodbc

      - name: Remove Postgres.app and install libpq via brew
        # cx_Freeze scans dylib dependencies and picks up libpq from the
        # pre-installed Postgres.app on macOS runners.  Remove it so that
        # the brew-installed libpq (under /opt/homebrew) is found instead.
        # We also create a compatibility symlink at the old Postgres.app path
        # in case any Python extension has that path baked into its RPATH.
        run: |
          brew install libpq
          brew link --force libpq
          BREW_LIBPQ=$(brew --prefix libpq)/lib/libpq.5.dylib
          sudo mkdir -p /Applications/Postgres.app/Contents/Versions/14/lib
          sudo ln -sf "$BREW_LIBPQ" /Applications/Postgres.app/Contents/Versions/14/lib/libpq.5.dylib

      - name: Install Python dependencies
        # Runtime deps only — build tools injected ephemerally via --with.
        run: uv sync --no-dev

      # Inkscape converts SVG → PNG at each size.
      # Pillow assembles the PNGs into an iconset; iconutil (macOS built-in)
      # compiles the iconset into an .icns file.
      - name: Convert app icon SVG → .icns
        run: |
          mkdir -p build/icons
          ICONSET=$(mktemp -d)/openstan.iconset
          mkdir -p "$ICONSET"

          # Standard sizes required by macOS iconutil
          for SZ in 16 32 64 128 256 512 1024; do
            inkscape --export-type=png \
                     --export-filename="${ICONSET}/icon_${SZ}x${SZ}.png" \
                     --export-width=${SZ} --export-height=${SZ} \
                     src/openstan/icons/icon-square.svg
          done

          # @2x variants (up to 512@2x = 1024px)
          for SZ in 16 32 64 128 256 512; do
            SZ2=$((SZ * 2))
            inkscape --export-type=png \
                     --export-filename="${ICONSET}/icon_${SZ}x${SZ}@2x.png" \
                     --export-width=${SZ2} --export-height=${SZ2} \
                     src/openstan/icons/icon-square.svg
          done

          iconutil -c icns "$ICONSET" -o build/icons/openstan.icns
          echo "Icon written to build/icons/openstan.icns"

      # ── cx_Freeze build ────────────────────────────────────────────────────
      # Step 1: build the .app bundle only (not the DMG yet)
      - name: Build .app bundle (cx_Freeze bdist_mac)
        run: uv run --with cx-freeze==8.6.4 python cx_freeze_setup.py bdist_mac

      # Step 2: import the Apple Developer ID certificate into a temporary
      # keychain on the runner so codesign can use it.
      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain
          # Prevent the keychain auto-locking during the ~35 min notarisation
          # wait (default lock timeout is 300s inactivity).  3600s covers the
          # full job comfortably; -u disables the lock-on-sleep setting.
          security set-keychain-settings -t 3600 -u build.keychain
          rm certificate.p12

      # Step 3: sign the .app bundle with the Developer ID Application
      # certificate under the hardened runtime (required for notarisation).
      #
      # codesign --deep is NOT used here.  Apple explicitly advises against
      # --deep for complex bundles (see developer.apple.com/forums/thread/129980).
      # Instead we sign from the inside out in three passes:
      #
      #   Pass 1 — every .dylib and .so individually (needs --timestamp; no
      #             --options runtime — that flag is only meaningful on main
      #             executables, not plain shared libraries)
      #   Pass 2 — every .framework bundle (same rules as pass 1)
      #   Pass 3 — the .app bundle itself (adds --options runtime and
      #             --entitlements so the hardened runtime is enabled and
      #             allow-unsigned-executable-memory is granted to Python/PyQt6)
      #
      # All passes include --timestamp so Apple's TSA embeds a secure
      # timestamp — required for notarisation.
      - name: Sign .app bundle (Developer ID)
        timeout-minutes: 10
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP=$(find build -maxdepth 3 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: no .app bundle found under build/" >&2
            exit 1
          fi
          echo "Signing: $APP"

          # Install GNU coreutils so we have `timeout` (gtimeout) available.
          # The macOS built-in shell has no timeout command; without a per-call
          # timeout a stalled TSA request can hang the loop indefinitely.
          brew install coreutils

          # Pass 1: sign every Mach-O binary individually (deepest first).
          # We use `file` to detect Mach-O rather than relying on filename
          # extensions because cx_Freeze copies some Qt binaries without any
          # extension (e.g. Contents/Resources/lib/QtCore).  This catches
          # .dylib, .so, Python extension modules, and bare Qt binaries alike.
          # Each codesign call is wrapped with a 60s timeout so a stalled TSA
          # request fails fast rather than hanging the entire step.
          find "$APP" -type f | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              gtimeout 60 codesign --force --timestamp \
                --sign "Developer ID Application: Jason Farrar ($APPLE_TEAM_ID)" \
                "$f" || { echo "ERROR: codesign timed out or failed for: $f" >&2; exit 1; }
            fi
          done

          # Pass 2: sign all .framework bundles
          find "$APP" -name "*.framework" -type d \
            | while read -r fw; do
                gtimeout 60 codesign --force --timestamp \
                  --sign "Developer ID Application: Jason Farrar ($APPLE_TEAM_ID)" \
                  "$fw" || { echo "ERROR: codesign timed out or failed for: $fw" >&2; exit 1; }
              done

          # Pass 3: sign the .app bundle itself (hardened runtime + entitlements)
          gtimeout 60 codesign --force --options runtime --timestamp \
            --entitlements packaging/macos/entitlements.plist \
            --sign "Developer ID Application: Jason Farrar ($APPLE_TEAM_ID)" \
            "$APP"

          codesign --verify --deep --strict "$APP" && echo "Signature OK"

      # Step 4a: submit the signed .app to Apple's notarisation service.
      # We use --no-progress and capture the submission ID into GITHUB_ENV
      # so the next step can poll for the result independently.  Separating
      # submit from polling gives each phase its own timeout and makes hangs
      # easy to diagnose (a hang here = network issue before Apple ACKs the
      # upload; a hang in step 4b = Apple's service is slow/unresponsive).
      - name: Submit .app for notarisation
        timeout-minutes: 5
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP=$(find build -maxdepth 3 -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" /tmp/openstan_notarise.zip
          echo "Submitting to Apple notarisation service..."

          submit_once() {
            xcrun notarytool submit /tmp/openstan_notarise.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json
          }

          SUBMIT_OUT=""
          for attempt in 1 2 3; do
            echo "Submit attempt $attempt/3..."
            if SUBMIT_OUT=$(submit_once 2> >(tee /dev/stderr >/dev/null)); then
              # Ensure parseable JSON
              if echo "$SUBMIT_OUT" | jq -e . >/dev/null 2>&1; then
                break
              fi
              echo "ERROR: notarytool returned non-JSON output:"
              echo "$SUBMIT_OUT"
            else
              echo "ERROR: notarytool submit failed:"
              echo "$SUBMIT_OUT"
            fi

            if [ "$attempt" -eq 3 ]; then
              rm -f /tmp/openstan_notarise.zip
              exit 1
            fi
            sleep 15
          done

          echo "$SUBMIT_OUT" | jq .

          rm -f /tmp/openstan_notarise.zip

          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | jq -r '.id // empty')
          if [ -z "$SUBMISSION_ID" ]; then
            echo "ERROR: failed to obtain submission ID from notarytool JSON output" >&2
            exit 1
          fi

          echo "Submission ID: $SUBMISSION_ID"
          echo "NOTARY_SUBMISSION_ID=$SUBMISSION_ID" >> "$GITHUB_ENV"

      # Step 4b: poll Apple's notarisation service until the submission is
      # accepted or rejected.  Each poll call is wrapped with gtimeout 30 so
      # a stalled network connection fails fast.  The step itself has a
      # timeout-minutes guard as a belt-and-braces backstop.
      # On any failure the full Apple notarisation log is fetched for diagnosis.
      - name: Wait for notarisation
        timeout-minutes: 75
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMISSION_ID="$NOTARY_SUBMISSION_ID"
          echo "Polling for submission: $SUBMISSION_ID"
          fetch_log() {
            echo "Fetching Apple notarisation log for $SUBMISSION_ID..." >&2
            gtimeout 60 xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" >&2 || true
          }
          MAX=120
          for i in $(seq 1 $MAX); do
            echo "Poll attempt $i / $MAX..."
            INFO=$(gtimeout 30 xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1) || {
              echo "ERROR: notarytool info timed out or failed on attempt $i" >&2
              exit 1
            }
            echo "$INFO" | jq .
            STATUS=$(echo "$INFO" | jq -r '.status // empty' 2>/dev/null)
            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarisation accepted."
              exit 0
            fi
            if [ "$STATUS" = "Invalid" ]; then
              echo "ERROR: notarisation rejected by Apple" >&2
              fetch_log
              exit 1
            fi
            if [ "$i" -eq "$MAX" ]; then
              echo "ERROR: notarisation did not complete after $MAX polls (~$((MAX / 2)) min)" >&2
              fetch_log
              exit 1
            fi
            echo "Status not final yet, waiting 30s..."
            sleep 30
          done

      # Step 5: staple the notarisation ticket to the .app bundle.
      # We wait 60s upfront for Apple's CloudKit CDN to propagate the ticket,
      # then retry up to 3 more times with 30s gaps.  Exits loudly if all
      # attempts fail so the workflow never packages an unstapled .app.
      - name: Staple notarisation ticket to .app
        run: |
          APP=$(find build -maxdepth 3 -name "*.app" | head -1)
          echo "Waiting 60s for notarisation ticket to propagate to CloudKit..."
          sleep 60
          for i in 1 2 3; do
            xcrun stapler staple "$APP" && { echo "Stapled: $APP"; break; }
            if [ "$i" -eq 3 ]; then
              echo "ERROR: stapling failed after 3 attempts" >&2
              exit 1
            fi
            echo "Staple attempt $i failed, retrying in 30s..."
            sleep 30
          done
          xcrun stapler validate "$APP"
          echo "Staple validated OK"

      # Step 6: wrap the stapled .app in a DMG using hdiutil.
      # The .app is already notarised and stapled at this point; the DMG is
      # purely a delivery container.  A symlink to /Applications is added so
      # the DMG presents the standard drag-to-Applications install experience.
      - name: Create .dmg from stapled .app (hdiutil)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          APP=$(find build -maxdepth 3 -name "*.app" | head -1)
          APP_NAME=$(basename "$APP" .app)
          VERSION="${REF_NAME#v}"   # strip leading 'v' from tag

          mkdir -p dist
          DMG="dist/openstan-${VERSION}-macOS.dmg"

          # deterministic staging path avoids mktemp edge cases
          STAGING="$RUNNER_TEMP/openstan-dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          trap 'rm -rf "$STAGING"' EXIT

          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          # remove stale output if present
          rm -f "$DMG"

          # best-effort cleanup of stale hdiutil state from prior attempts
          hdiutil detach /Volumes/openstan -force >/dev/null 2>&1 || true
          hdiutil detach "$(hdiutil info | awk "/openstan/ {print \$1; exit}")" -force >/dev/null 2>&1 || true

          # ensure filesystem consistency before hdiutil
          sync
          sleep 2

          for attempt in 1 2 3; do
            echo "DMG create attempt $attempt/3..."
            if hdiutil create \
                -volname "openstan" \
                -srcfolder "$STAGING" \
                -ov \
                -format UDZO \
                "$DMG"; then
              echo "Created: $DMG"
              ls -lh dist/
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: hdiutil create failed after 3 attempts" >&2
              exit 1
            fi

            echo "hdiutil busy; retrying in 10s..."
            sleep 10
          done

      # Step 7: sign the DMG itself for integrity.  The .app inside is already
      # notarised and stapled; Gatekeeper will verify the .app ticket on install.
      # --timestamp is required for Developer ID signatures.
      # Apple's TSA can stall for several minutes; we retry up to 3 times with
      # a 180s per-attempt timeout and a 30s gap between attempts.
      - name: Sign .dmg (Developer ID)
        timeout-minutes: 10
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find dist -name "*.dmg" | head -1)
          # Re-unlock the build keychain — it may have auto-locked during the
          # ~35 min notarisation wait despite the 3600s timeout set at import
          # time (belt-and-braces; costs nothing).
          security unlock-keychain -p "" build.keychain
          for attempt in 1 2 3; do
            echo "DMG sign attempt $attempt / 3..."
            gtimeout 180 codesign --force --timestamp \
              --sign "Developer ID Application: Jason Farrar ($APPLE_TEAM_ID)" \
              "$DMG" && { echo "DMG signed: $DMG"; break; }
            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: DMG signing failed after 3 attempts" >&2
              exit 1
            fi
            echo "Attempt $attempt failed (TSA stall), retrying in 30s..."
            sleep 30
          done

      # ── PyInstaller fallback (uncomment if cx_Freeze fails) ───────────────
      # - name: Build .app bundle (PyInstaller fallback)
      #   run: uv run pyinstaller openstan.spec
      # - name: Create .dmg from .app (create-dmg)
      #   run: |
      #     brew install create-dmg
      #     create-dmg \
      #       --volname "openstan" \
      #       --window-pos 200 120 \
      #       --window-size 600 400 \
      #       --icon-size 100 \
      #       --app-drop-link 450 185 \
      #       "dist/openstan.dmg" \
      #       "dist/openstan.app"

      - name: Upload .dmg to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          draft: true
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Scan binaries with VirusTotal
  # ---------------------------------------------------------------------------
  #
  # Runs after all four platform builds complete successfully.
  # Scans each binary against 75+ antivirus engines via VirusTotal API.
  #
  #   • Malicious detections (known malware) → workflow FAILS (draft release must not be promoted)
  #   • Suspicious detections (heuristics) → logged but PASSES (release proceeds)
  #   • Clean binaries → PASS immediately
  #
  # All results are logged to GitHub Actions for maintainer audit.
  # See SECURITY.md for false positive policy and handling procedures.
  # ---------------------------------------------------------------------------
  scan-with-virustotal:
    name: Scan binaries with VirusTotal
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    if: success()  # Only run if all builds succeeded
    permissions:
      contents: write  # needed to download assets from draft releases

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download all built binaries from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          
          mkdir -p scan_binaries
          cd scan_binaries
          
          # Download all assets from the draft release that was just created
          # The release exists because each build job uploaded to it
          echo "Downloading binaries for tag: $TAG"
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --pattern "*.msi" \
            --pattern "*.dmg" || {
            echo "ERROR: Failed to download binaries for tag: $TAG"
            exit 1
          }
          
          echo "--- Downloaded binaries ---"
          ls -lh
          echo "Total files: $(ls -1 | wc -l)"

      - name: Scan binaries with VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          set -euo pipefail
          
          if [ -z "$VIRUSTOTAL_API_KEY" ]; then
            echo "ERROR: VIRUSTOTAL_API_KEY secret is not configured"
            echo "Set up at: GitHub Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          cd scan_binaries
          BINARY_COUNT=$(ls -1 | wc -l)
          
          if [ "$BINARY_COUNT" -eq 0 ]; then
            echo "ERROR: No binaries found to scan"
            exit 1
          fi
          
          echo "Scanning $BINARY_COUNT binaries with VirusTotal..."
          echo ""
          
          FAILED=0
          PASSED=0
          
           for binary in *; do
             [ -f "$binary" ] || continue
             
             FILE_SIZE=$(stat -f%z "$binary" 2>/dev/null || stat -c%s "$binary" 2>/dev/null || echo "unknown")
             echo "────────────────────────────────────────────────────────────"
             echo "[$(($PASSED + $FAILED + 1))/$BINARY_COUNT] Scanning: $binary"
             echo "  Size: $FILE_SIZE bytes"
             
             # Calculate SHA256 for reference
             SHA256=$(sha256sum "$binary" | cut -d' ' -f1)
             echo "  SHA256: $SHA256"
             
             # Step 1: Choose upload endpoint based on file size
             echo "  Uploading to VirusTotal..."
             
             UPLOAD_ENDPOINT="https://www.virustotal.com/api/v3/files"
             FILE_SIZE_BYTES=$(stat -c%s "$binary" 2>/dev/null || stat -f%z "$binary")
             
             # VT public endpoint has a 32MB limit; large files need special upload URL
             if [ "$FILE_SIZE_BYTES" -gt 33554432 ]; then
               echo "  File exceeds 32MB; requesting large-file upload URL..."
               LARGE_URL_RESP=$(curl -sS --retry 3 --retry-delay 5 --retry-all-errors \
                 -H "x-apikey: ${VIRUSTOTAL_API_KEY}" \
                 "https://www.virustotal.com/api/v3/files/upload_url")
               UPLOAD_ENDPOINT=$(echo "$LARGE_URL_RESP" | jq -r '.data // empty')
               if [ -z "$UPLOAD_ENDPOINT" ]; then
                 echo "  ERROR: Failed to obtain large-file upload URL"
                 FAILED=$((FAILED + 1))
                 continue
               fi
             fi
             
             UPLOAD_RESPONSE=$(curl -sS --retry 3 --retry-delay 5 --retry-all-errors -w "\n%{http_code}" -X POST \
               -H "x-apikey: ${VIRUSTOTAL_API_KEY}" \
               -F "file=@${binary}" \
               "$UPLOAD_ENDPOINT" || printf "\n000")
             HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
             BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
             
             if [ "$HTTP_CODE" != "200" ]; then
               echo "  ERROR: Upload failed with HTTP $HTTP_CODE"
               echo "  Response: $BODY"
               FAILED=$((FAILED + 1))
               continue
             fi
             
             ANALYSIS_ID=$(echo "$BODY" | jq -r '.data.id // empty')
             if [ -z "$ANALYSIS_ID" ]; then
               echo "  ERROR: Failed to extract analysis ID from response"
               FAILED=$((FAILED + 1))
               continue
             fi
             
             echo "  Upload successful (Analysis ID: ${ANALYSIS_ID:0:16}...)"
             
             # Step 2: Poll for analysis completion
             echo "  Polling for analysis completion..."
             ATTEMPTS=0
             MAX_ATTEMPTS=120  # 120 iterations × 30s = 60 min timeout
             STATUS="queued"
             
             while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
                ANALYSIS_RAW=$(curl -sS --retry 3 --retry-delay 5 --retry-all-errors -w "\n%{http_code}" -X GET \
                  -H "x-apikey: ${VIRUSTOTAL_API_KEY}" \
                  "https://www.virustotal.com/api/v3/analyses/${ANALYSIS_ID}" || printf "\n000")
                ANALYSIS_HTTP_CODE=$(echo "$ANALYSIS_RAW" | tail -n1)
                ANALYSIS_RESPONSE=$(echo "$ANALYSIS_RAW" | sed '$d')
                if [ "$ANALYSIS_HTTP_CODE" != "200" ]; then
                  echo "    ERROR: Failed to fetch analysis status (HTTP $ANALYSIS_HTTP_CODE)"
                  FAILED=$((FAILED + 1))
                  STATUS="failed"
                  break
                fi
                STATUS=$(echo "$ANALYSIS_RESPONSE" | jq -r '.data.attributes.status // "unknown"')
               
               if [ "$STATUS" = "completed" ]; then
                 break
               fi
               
               if [ "$STATUS" = "failed" ]; then
                 echo "  ERROR: Analysis failed"
                 FAILED=$((FAILED + 1))
                 STATUS="failed"
                 break
               fi
               
               ATTEMPTS=$((ATTEMPTS + 1))
               ELAPSED=$((ATTEMPTS * 30))
               echo "    Still polling... (${ELAPSED}s elapsed, status: $STATUS)"
               sleep 30
             done
             
             if [ "$STATUS" != "completed" ]; then
               echo "  ERROR: Analysis did not complete after $((MAX_ATTEMPTS * 30))s"
               FAILED=$((FAILED + 1))
               continue
             fi
             
             # Step 3: Fetch and parse results
             echo "  Analysis complete, fetching results..."
             
              FILE_REPORT_RAW=$(curl -sS --retry 3 --retry-delay 5 --retry-all-errors -w "\n%{http_code}" -X GET \
                -H "x-apikey: ${VIRUSTOTAL_API_KEY}" \
                "https://www.virustotal.com/api/v3/files/${SHA256}" || printf "\n000")
              FILE_HTTP_CODE=$(echo "$FILE_REPORT_RAW" | tail -n1)
              FILE_BODY=$(echo "$FILE_REPORT_RAW" | sed '$d')
              if [ "$FILE_HTTP_CODE" != "200" ]; then
                echo "  ERROR: Failed to fetch VirusTotal file report (HTTP $FILE_HTTP_CODE)"
                echo "  Response: $FILE_BODY"
                FAILED=$((FAILED + 1))
                continue
              fi
              FILE_RESPONSE="$FILE_BODY"
              MALICIOUS=$(echo "$FILE_RESPONSE" | jq -r '.data.attributes.last_analysis_stats.malicious // 0' 2>/dev/null || echo "0")
              SUSPICIOUS=$(echo "$FILE_RESPONSE" | jq -r '.data.attributes.last_analysis_stats.suspicious // 0' 2>/dev/null || echo "0")
              UNDETECTED=$(echo "$FILE_RESPONSE" | jq -r '.data.attributes.last_analysis_stats.undetected // 0' 2>/dev/null || echo "0")
              TIMEOUT=$(echo "$FILE_RESPONSE" | jq -r '.data.attributes.last_analysis_stats.timeout // 0' 2>/dev/null || echo "0")

              echo "  Results: malicious=$MALICIOUS, suspicious=$SUSPICIOUS, undetected=$UNDETECTED, timeout=$TIMEOUT"
             
             # Step 4: Determine pass/fail
             if [ "$MALICIOUS" -gt 0 ]; then
               echo "  ❌ FAIL: Binary flagged with $MALICIOUS malicious detection(s)"
               echo ""
               echo "  Detections:"
               echo "$FILE_RESPONSE" | jq -r '.data.attributes.last_analysis_results | to_entries[] | select(.value.category == "malicious") | "    \(.key): \(.value.engine_name) (\(.value.category))"' 2>/dev/null || echo "    (see VT dashboard for details)"
               echo ""
               FAILED=$((FAILED + 1))
             else
               if [ "$SUSPICIOUS" -gt 0 ]; then
                 echo "  ⚠️  WARN: Binary flagged with $SUSPICIOUS suspicious detection(s) (allowed)"
                 echo "  Suspicious detections:"
                 echo "$FILE_RESPONSE" | jq -r '.data.attributes.last_analysis_results | to_entries[] | select(.value.category == "suspicious") | "    \(.key): \(.value.engine_name) (\(.value.category))"' 2>/dev/null || echo "    (see VT dashboard for details)"
               else
                 echo "  ✅ PASS: Binary is clean"
               fi
               PASSED=$((PASSED + 1))
             fi
             
             echo ""
             
             # Rate limit: VT free tier allows 4 req/min, be conservative
             sleep 2
           done
          
          echo "────────────────────────────────────────────────────────────"
          echo "Scan Summary:"
          echo "  Passed: $PASSED/$BINARY_COUNT"
          echo "  Failed: $FAILED/$BINARY_COUNT"
          echo ""
          
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ SCANNING FAILED: $FAILED binary(ies) had malicious detections or could not be scanned"
            echo ""
            echo "For details, see:"
            echo "  • GitHub Actions logs above"
            echo "  • VirusTotal dashboard: https://www.virustotal.com/gui/home/upload"
            echo "  • Security policy: SECURITY.md in the repository"
            exit 1
          fi
          
          echo "✅ ALL BINARIES PASSED VIRUSTOTAL SCAN"
          exit 0

  # ---------------------------------------------------------------------------
  # Cleanup — strip binary assets from releases beyond the 5 most recent
  # ---------------------------------------------------------------------------
  #
  # Runs after VirusTotal scanning completes (regardless of pass/fail).
  # Keeping this as a job in release.yml (rather than a separate workflow
  # triggered by the `release: published` event) is intentional: GitHub
  # suppresses downstream workflow runs when the triggering workflow uses
  # GITHUB_TOKEN, so a standalone cleanup workflow would never fire.
  #
  # For each release older than the 5 most recent:
  #   1. Every binary asset is deleted.
  #   2. A NOTICE.txt is uploaded in its place, pointing users to the
  #      latest release.  The step is idempotent — re-runs are safe.
  # ---------------------------------------------------------------------------
  cleanup:
    name: Strip assets from releases beyond the 5 most recent
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-arm64, build-windows, build-macos, scan-with-virustotal]
    if: always()  # Run even if scan fails (cleanup is independent)
    permissions:
      contents: write

    env:
      KEEP: 5
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Delete old assets and upload NOTICE.txt
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          echo "Fetching release list for ${REPO}..."

          # Fetch up to 100 releases, newest first, as newline-separated tag names.
          # Pre-releases intentionally count toward KEEP so a run of RCs cannot
          # cause stable release assets to be stripped early.
          TAGS=$(gh release list \
                   --repo "$REPO" \
                   --limit 100 \
                   --json tagName,createdAt \
                   --order desc \
                   --jq '.[].tagName')

          TAG_COUNT=$(echo "$TAGS" | wc -l)
          echo "Found ${TAG_COUNT} release(s). Keeping assets on the ${KEEP} most recent."

          INDEX=0
          while IFS= read -r TAG; do
            INDEX=$((INDEX + 1))

            if [ "$INDEX" -le "$KEEP" ]; then
              echo "[${INDEX}] KEEP   ${TAG}"
              continue
            fi

            # ── Skip draft releases — they will be cleaned up after promotion ──
            IS_DRAFT=$(gh release view "$TAG" \
                        --repo "$REPO" \
                        --json isDraft \
                        --jq '.isDraft' 2>/dev/null || echo "false")
            if [ "$IS_DRAFT" = "true" ]; then
              echo "[${INDEX}] SKIP   ${TAG} (draft release — waiting for manual promotion)"
              continue
            fi

            echo "[${INDEX}] STRIP  ${TAG}"

            # ── Delete every existing asset on this release ──────────────────
            # Fetch asset names directly — gh release delete-asset takes a name,
            # not an ID.  Names within a single release are unique (GitHub enforces
            # this), so name-based deletion is unambiguous.
            ASSET_NAMES=$(gh release view "$TAG" \
                            --repo "$REPO" \
                            --json assets \
                            --jq '.assets[].name' 2>/dev/null || true)

            if [ -n "$ASSET_NAMES" ]; then
              while IFS= read -r ASSET_NAME; do
                if [ "$ASSET_NAME" = "NOTICE.txt" ]; then
                  echo "  Skipping existing NOTICE.txt on ${TAG}"
                  continue
                fi
                echo "  Deleting asset '${ASSET_NAME}' from ${TAG}..."
                gh release delete-asset "$TAG" "$ASSET_NAME" \
                  --repo "$REPO" \
                  --yes
              done <<< "$ASSET_NAMES"
            else
              echo "  No assets found on ${TAG} (already stripped or never uploaded)."
            fi

            # ── Skip NOTICE.txt upload if already present ────────────────────
            NOTICE_EXISTS=$(gh release view "$TAG" \
                              --repo "$REPO" \
                              --json assets \
                              --jq '.assets[] | select(.name == "NOTICE.txt") | .name' \
                              2>/dev/null || true)
            if [ -n "$NOTICE_EXISTS" ]; then
              echo "  NOTICE.txt already present on ${TAG}, skipping upload."
              continue
            fi

            # ── Write and upload NOTICE.txt ──────────────────────────────────
            NOTICE_FILE=$(mktemp /tmp/NOTICE_XXXXXX.txt)
            cat > "$NOTICE_FILE" <<EOF
          Installation assets for this release have been removed as part of routine maintenance.

          Please visit https://github.com/${REPO}/releases/latest to download the latest version.
          EOF

            gh release upload "$TAG" "$NOTICE_FILE#NOTICE.txt" \
              --repo "$REPO" \
              --clobber
            echo "  Uploaded NOTICE.txt to ${TAG}."
            rm -f "$NOTICE_FILE"

          done <<< "$TAGS"

          echo "Done."
