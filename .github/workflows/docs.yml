name: Docs

on:
  push:
    branches: [master]
    paths:
      # Rebuild when doc sources or manually committed screenshots change
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:  # allow manual trigger

# Only one deploy at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write  # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build docs
        run: uv run zensical build

      - name: Deploy to GitHub Pages
        run: |
          uv run ghp-import \
            --no-jekyll \
            --push \
            --force \
            --branch gh-pages \
            --cname openstan.org \
            site
        env:
          # Use the GITHUB_TOKEN provided automatically by Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
