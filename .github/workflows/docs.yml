name: Docs

on:
  push:
    branches: [master]
    paths:
      # Rebuild when doc sources or manually committed screenshots change
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:  # allow manual trigger

# Only one deploy at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

permissions: {}  # no workflow-level permissions; job declares its own

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed to push to gh-pages branch

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build docs
        run: uv run zensical build
        env:
          GOATCOUNTER_URL: ${{ secrets.GOATCOUNTER_URL }}

      - name: Deploy to GitHub Pages
        run: |
          uv run ghp-import \
            --no-jekyll \
            --push \
            --force \
            --branch gh-pages \
            --cname openstan.org \
            site
