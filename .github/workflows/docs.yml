name: Docs

on:
  push:
    branches: [master]
    paths:
      # Rebuild when doc sources or manually committed screenshots change
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:  # allow manual trigger

# Only one deploy at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

permissions: {}  # no workflow-level permissions; job declares its own

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed to push to gh-pages branch

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build docs
        run: uv run zensical build
        env:
          GOATCOUNTER_URL: ${{ secrets.GOATCOUNTER_URL }}

      - name: Deploy to GitHub Pages
        run: |
          uv run ghp-import \
            --no-jekyll \
            --push \
            --force \
            --branch gh-pages \
            --cname openstan.org \
            site
